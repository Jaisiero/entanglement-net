[protocol]
version = 2
max_payload_bytes = 1154

# ─────────────────────────────────────────────
# SYSTEM MESSAGES (0x0001 - 0x00FF)
# ─────────────────────────────────────────────

[[message]]
id = 0x0001
name = "SessionOpen"
channel = "control"
direction = "server_to_client"
# persistent_id: stable DB-level player ID, preserved across shard handoffs.
# Added post-v1; downstream consumers rely on this field.
fields = [
  { name = "protocol_version", type = "u16" },
  { name = "player_id",        type = "u32" },
  { name = "shard_id",         type = "u32" },
  { name = "origin_x",         type = "f32" },
  { name = "origin_z",         type = "f32" },
  { name = "server_tick",      type = "u32" },
  { name = "tick_rate_hz",     type = "u16" },
  { name = "persistent_id",    type = "u32" },
]

[[message]]
id = 0x0002
name = "SessionClose"
channel = "control"
direction = "bidirectional"
fields = [
  { name = "reason", type = "u8" },
]

[[message]]
id = 0x0003
name = "Ping"
channel = "unreliable"
direction = "client_to_server"
fields = [
  { name = "client_frame",   type = "u32" },
  { name = "client_time_us", type = "u64" },
]

[[message]]
id = 0x0004
name = "Pong"
channel = "unreliable"
direction = "server_to_client"
fields = [
  { name = "client_frame",   type = "u32" },
  { name = "client_time_us", type = "u64" },
  { name = "server_tick",    type = "u32" },
  { name = "server_time_us", type = "u64" },
  { name = "tick_delta_us",  type = "u32" },
]

[[message]]
id = 0x0005
name = "ShardHandoff"
channel = "control"
direction = "server_to_client"
fields = [
  { name = "new_shard_ip_packed", type = "u32" },
  { name = "new_shard_port",      type = "u16" },
  { name = "new_shard_id",        type = "u32" },
  { name = "new_origin_x",        type = "f32" },
  { name = "new_origin_z",        type = "f32" },
  { name = "handoff_tick",        type = "u32" },
  { name = "handoff_token",       type = "u64" },
]

# HandoffAuth (0x0006) — client_to_server, RELIABLE channel 2
# Sent by clients reconnecting after SHARD_HANDOFF. Skips JWT verification.
# Fixed payload: entity_id(u32) + handoff_token(u64) + client_current_sequence(u32)
#                + client_action_sequence(u32) = 20 bytes.
#
# client_current_sequence / client_action_sequence carry the client's current
# input/action sequence counters so the learner shard can seed its per-player
# dedup state correctly (prevents input rejection after handoff).
# Clients using the legacy 12-byte format will have the server default both
# sequences to 0, which resets dedup on the learner.
[[message]]
id = 0x0006
name = "HandoffAuth"
channel = "control"
direction = "client_to_server"
fields = [
  { name = "entity_id",               type = "u32" },
  { name = "handoff_token",           type = "u64" },
  { name = "client_current_sequence", type = "u32" },
  { name = "client_action_sequence",  type = "u32" },
]

# SessionAuth (0x0007) — client_to_server, RELIABLE channel 2
# Sent right after UDP connect. Shard ignores other messages until received.
# Variable payload: [jwt_length: u16][jwt_bytes: N] (max JWT 512 bytes)
# The struct only covers the fixed header; helpers handle the JWT bytes.
[[message]]
id = 0x0007
name = "SessionAuth"
channel = "reliable"
direction = "client_to_server"
fields = [
  { name = "jwt_length", type = "u16" },
]

# SessionAuthFailed (0x0008) — server_to_client, RELIABLE channel 2
# Sent if JWT verification fails. Client should return to lobby.
# reason: 0x00=InvalidToken, 0x01=Expired, 0x02=ServerFull, 0x03=AlreadyConnected
[[message]]
id = 0x0008
name = "SessionAuthFailed"
channel = "reliable"
direction = "server_to_client"
fields = [
  { name = "reason", type = "u8"  },
  { name = "pad_a",  type = "u8"  },
  { name = "pad_b",  type = "u8"  },
  { name = "pad_c",  type = "u8"  },
]

# ─────────────────────────────────────────────
# ENTITY MESSAGES (0x0100 - 0x01FF)
# ─────────────────────────────────────────────

[[message]]
id = 0x0100
name = "EntitySpawn"
channel = "reliable"
direction = "server_to_client"
fields = [
  { name = "entity_id",       type = "u32" },
  { name = "entity_type",     type = "u16" },
  { name = "x",               type = "f32" },
  { name = "y",               type = "f32" },
  { name = "z",               type = "f32" },
  { name = "orientation",     type = "f32" },
  { name = "initial_state",   type = "u32" },
]

[[message]]
id = 0x0101
name = "EntityDespawn"
channel = "reliable"
direction = "server_to_client"
fields = [
  { name = "entity_id", type = "u32" },
  { name = "reason",    type = "u8" },
]

[[message]]
id = 0x0102
name = "EntityMove"
channel = "unreliable"
direction = "server_to_client"
fields = [
  { name = "entity_id",   type = "u32" },
  { name = "server_tick", type = "u32" },
  { name = "x",           type = "f32" },
  { name = "y",           type = "f32" },
  { name = "z",           type = "f32" },
  { name = "orientation", type = "f32" },
  { name = "vx",          type = "f32" },
  { name = "vy",          type = "f32" },
  { name = "vz",          type = "f32" },
  # FNV-1a hash of the broadcasting shard's `shard_id`. Receivers
  # (notably mmo-viewer) colour-code each entity by its authoritative
  # shard so authority transitions are legible the same tick the wire
  # reports them, instead of inferring from `(x, z)` ↔ region overlap.
  # 0 means "unknown" — older sender that hasn't been upgraded yet.
  { name = "source_shard_hash", type = "u32" },
]

# Batch of compact entity moves sharing a single server_tick.
# Packet layout: [MsgHeader][EntityMoveBatch.server_tick][EntityMoveCompact × N]
# MsgHeader.msg_length = 4 + N × 36
[[message]]
id = 0x0107
name = "EntityMoveBatch"
channel = "unreliable"
direction = "server_to_client"
fields = [
  { name = "server_tick", type = "u32" },
]

# Compact entity move — no per-entity header or server_tick.
# 36 bytes (was 32 / one AVX2 register before `source_shard_hash`
# was appended). Used inside EntityMoveBatch.
[[message]]
id = 0x0108
name = "EntityMoveCompact"
channel = "unreliable"
direction = "server_to_client"
fields = [
  { name = "entity_id",   type = "u32" },
  { name = "x",           type = "f32" },
  { name = "y",           type = "f32" },
  { name = "z",           type = "f32" },
  { name = "orientation", type = "f32" },
  { name = "vx",          type = "f32" },
  { name = "vy",          type = "f32" },
  { name = "vz",          type = "f32" },
  # Same semantics as EntityMove.source_shard_hash. Carried in the
  # per-tick compact path (the hot route for the viewer's entity
  # feed), so the ring colour stays accurate every tick.
  { name = "source_shard_hash", type = "u32" },
]

# Delta-encoded entity move batch (variable-length, hand-serialised).
# Wire: MsgHeader(6B) + server_tick(4B) + bitfield(1B) +
#       N × (entity_id(4B) + changed_fields...)
# All entities in one packet share the same bitfield; stride = 4 + popcount*4.
# Codegen emits only the msg_type constant; the encoder/decoder is hand-written.
[[message]]
id = 0x0109
name = "EntityMoveDeltaBatch"
channel = "unreliable"
direction = "server_to_client"
raw = true

[[message]]
id = 0x0103
name = "EntityState"
channel = "reliable"
direction = "server_to_client"
fields = [
  { name = "entity_id",  type = "u32" },
  { name = "server_tick", type = "u32" },
  { name = "state_id",   type = "u16" },
  { name = "param_a",    type = "u32" },
  { name = "param_b",    type = "u32" },
]

[[message]]
id = 0x0104
name = "EntityHealth"
channel = "reliable"
direction = "server_to_client"
fields = [
  { name = "entity_id", type = "u32" },
  { name = "hp",        type = "u32" },
  { name = "max_hp",    type = "u32" },
]

# Combat confirmation — RELIABLE channel 2
# Server confirms a successful hit to the attacker.
[[message]]
id = 0x0105
name = "HitConfirm"
channel = "reliable"
direction = "server_to_client"
fields = [
  { name = "input_sequence", type = "u32" },
  { name = "target_id",      type = "u32" },
  { name = "damage_dealt",   type = "u32" },
  { name = "target_hp",      type = "u32" },
  { name = "server_tick",    type = "u32" },
]

# Combat rejection — RELIABLE channel 2
# Server rejects an action with a reason code.
# Reasons: 0x00=NoStamina, 0x01=InRecovery,
#           0x02=AlreadyAttacking, 0x03=Dead, 0x04=NotInPvpZone
[[message]]
id = 0x0106
name = "ActionRejected"
channel = "reliable"
direction = "server_to_client"
fields = [
  { name = "input_sequence", type = "u32" },
  { name = "reason",         type = "u8"  },
  { name = "pad_a",          type = "u8"  },
  { name = "pad_b",          type = "u8"  },
  { name = "pad_c",          type = "u8"  },
]

# ─────────────────────────────────────────────
# INPUT MESSAGES (0x0200 - 0x02FF)
# ─────────────────────────────────────────────

# Continuous movement — UNRELIABLE channel 1
# High frequency (30Hz), loss tolerated.
# Order guaranteed via input_sequence on the server.
# Redundancy (PlayerMoveBatch) recovers lost packets.
[[message]]
id = 0x0200
name = "PlayerMove"
channel = "unreliable"
direction = "client_to_server"
fields = [
  { name = "input_sequence",        type = "u32" },
  { name = "estimated_server_tick", type = "u32" },
  { name = "move_x",               type = "f32" },
  { name = "move_z",               type = "f32" },
  { name = "orientation",          type = "f32" },
  { name = "buttons",              type = "u32" },
]

# Batch with redundancy — last N PlayerMove per packet
# Recovers losses without head-of-line blocking
[[message]]
id = 0x0201
name = "PlayerMoveBatch"
channel = "unreliable"
direction = "client_to_server"
variable_length = true
max_entries = 8
entry_type = "PlayerMove"

# Discrete actions — RELIABLE channel 2
# Low frequency (jump, attack, dodge, ability).
# Cannot be lost — unique, unrepeatable events.
# input_sequence detects duplicates on retransmission.
[[message]]
id = 0x0202
name = "PlayerAction"
channel = "reliable"
direction = "client_to_server"
fields = [
  { name = "input_sequence", type = "u32" },
  { name = "server_tick",    type = "u32" },
  { name = "action_type",    type = "u8"  },
  { name = "pad_a",          type = "u8"  },
  { name = "pad_b",          type = "u8"  },
  { name = "pad_c",          type = "u8"  },
  { name = "param_a",        type = "u32" },
  { name = "param_b",        type = "u32" },
]

# StateAck — UNRELIABLE channel 1
# Authoritative server position sent to client.
# If lost, the next one replaces it.
[[message]]
id = 0x0203
name = "StateAck"
channel = "unreliable"
direction = "server_to_client"
fields = [
  { name = "input_sequence_acked", type = "u32" },
  { name = "server_tick",          type = "u32" },
  { name = "tick_delta_us",        type = "u32" },
  { name = "x",                    type = "f32" },
  { name = "y",                    type = "f32" },
  { name = "z",                    type = "f32" },
  { name = "vx",                   type = "f32" },
  { name = "vy",                   type = "f32" },
  { name = "vz",                   type = "f32" },
  { name = "hp",                   type = "u32" },
  { name = "stamina",              type = "f32" },
]

# ─────────────────────────────────────────────
# INTER-SHARD MESSAGES (0x0300 - 0x03FF)
# Shard-to-shard P2P over dedicated UDP port
# ─────────────────────────────────────────────

# UDP handshake — establish trust between peer shards.
# hmac: HMAC-SHA256(INTERNAL_API_KEY, sorted(shard_id_a, shard_id_b))
# Truncated to 16 bytes for wire efficiency.
[[message]]
id = 0x0300
name = "IntershardHandshake"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "shard_id",    type = "u32" },
  { name = "sequence",    type = "u32" },
  { name = "hmac_0",      type = "u64" },
  { name = "hmac_1",      type = "u64" },
]

# Handshake acknowledgement
[[message]]
id = 0x0301
name = "IntershardHandshakeAck"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "shard_id",    type = "u32" },
  { name = "sequence",    type = "u32" },
  { name = "ok",          type = "u8"  },
  { name = "pad_a",       type = "u8"  },
  { name = "pad_b",       type = "u8"  },
  { name = "pad_c",       type = "u8"  },
]

# Peer keepalive — sent every 2 seconds
[[message]]
id = 0x0302
name = "IntershardHeartbeat"
channel = "unreliable"
direction = "bidirectional"
fields = [
  { name = "shard_id",      type = "u32" },
  { name = "server_tick",   type = "u32" },
  { name = "player_count",  type = "u32" },
  { name = "ghost_count",   type = "u32" },
]

# Entity entered boundary zone — create ghost on receiver
[[message]]
id = 0x0310
name = "IntershardEntityEnter"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",    type = "u32" },
  { name = "entity_type",  type = "u16" },
  { name = "pad_a",        type = "u16" },
  { name = "x",            type = "f32" },
  { name = "y",            type = "f32" },
  { name = "z",            type = "f32" },
  { name = "orientation",  type = "f32" },
  { name = "vx",           type = "f32" },
  { name = "vy",           type = "f32" },
  { name = "vz",           type = "f32" },
  { name = "hp",           type = "u32" },
  { name = "max_hp",       type = "u32" },
  { name = "combat_state", type = "u8"  },
  { name = "pvp_flag",     type = "u8"  },
  { name = "pad_b",        type = "u8"  },
  { name = "pad_c",        type = "u8"  },
]

# Position/velocity update for ghost entity — unreliable, every tick.
# hp/combat_state carry live state to the ghost on the remote shard so
# combat HUDs and client-side prediction stay coherent.
[[message]]
id = 0x0311
name = "IntershardEntityUpdate"
channel = "unreliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",    type = "u32" },
  { name = "x",            type = "f32" },
  { name = "y",            type = "f32" },
  { name = "z",            type = "f32" },
  { name = "orientation",  type = "f32" },
  { name = "vx",           type = "f32" },
  { name = "vy",           type = "f32" },
  { name = "vz",           type = "f32" },
  { name = "hp",           type = "u32" },
  { name = "combat_state", type = "u8"  },
  { name = "pad_a",        type = "u8"  },
  { name = "pad_b",        type = "u8"  },
  { name = "pad_c",        type = "u8"  },
]

# Entity left boundary zone — remove ghost
[[message]]
id = 0x0312
name = "IntershardEntityLeave"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "entity_id", type = "u32" },
  { name = "reason",    type = "u8" },
  { name = "pad_a",     type = "u8" },
  { name = "pad_b",     type = "u8" },
  { name = "pad_c",     type = "u8" },
]

# Delta-encoded variant of IntershardEntityUpdate (hand-serialised).
# See `entanglement_net::delta` for the wire format.
# Codegen emits only the msg_type constant; encoder/decoder are hand-written.
[[message]]
id = 0x0314
name = "IntershardEntityUpdateDelta"
channel = "unreliable"
direction = "bidirectional"
raw = true

# Full entity state transfer for handoff
[[message]]
id = 0x0313
name = "IntershardEntityState"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",    type = "u32" },
  { name = "x",            type = "f64" },
  { name = "y",            type = "f64" },
  { name = "z",            type = "f64" },
  { name = "vx",           type = "f64" },
  { name = "vy",           type = "f64" },
  { name = "vz",           type = "f64" },
  { name = "orientation",  type = "f64" },
  { name = "hp",           type = "u32" },
  { name = "stamina_x100", type = "u32" },
  { name = "combat_state", type = "u8"  },
  { name = "pvp_flag",     type = "u8"  },
  { name = "pad_a",        type = "u8"  },
  { name = "pad_b",        type = "u8"  },
  { name = "combat_state_param", type = "u32" },
  { name = "group_id",          type = "u32" },
  { name = "last_sequence",     type = "u32" },
  { name = "last_action_sequence", type = "u32" },
  { name = "handoff_token",   type = "u64" },
]

# Request entity ownership transfer(handoff)
[[message]]
id = 0x0320
name = "IntershardHandoffReq"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",  type = "u32" },
  { name = "sequence",   type = "u32" },
  { name = "handoff_tick", type = "u32" },
]

# Confirm ready to accept entity
[[message]]
id = 0x0321
name = "IntershardHandoffAck"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "entity_id", type = "u32" },
  { name = "sequence",  type = "u32" },
  { name = "ok",        type = "u8"  },
  { name = "pad_a",     type = "u8"  },
  { name = "pad_b",     type = "u8"  },
  { name = "pad_c",     type = "u8"  },
]

# Learner → Origin notification: the client has consumed its handoff token
# (HANDOFF_AUTH or JWT fast-path matched). The origin can cancel pending
# SHARD_HANDOFF UDP resends early, saving ~95% of the grace-period resend
# traffic that would otherwise continue for up to 5 s per handoff.
#
# handoff_token is echoed back from IntershardEntityState for defence in depth:
# the origin only cancels if the token matches, preventing stale/replayed
# COMPLETE packets from affecting a subsequent (reused) entity_id handoff.
[[message]]
id = 0x0322
name = "IntershardHandoffComplete"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",     type = "u32" },
  { name = "handoff_token", type = "u64" },
]

# Forward attack from local player to ghost's authoritative shard
[[message]]
id = 0x0330
name = "IntershardAttack"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "attacker_entity_id", type = "u32" },
  { name = "target_entity_id",   type = "u32" },
  { name = "attack_sequence",    type = "u32" },
  { name = "action_type",        type = "u8"  },
  { name = "pad_a",              type = "u8"  },
  { name = "pad_b",              type = "u8"  },
  { name = "pad_c",              type = "u8"  },
  { name = "attacker_x",         type = "f32" },
  { name = "attacker_z",         type = "f32" },
  { name = "attacker_orientation", type = "f32" },
]

# Hit/miss result from authoritative shard
[[message]]
id = 0x0331
name = "IntershardHitResult"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "attacker_entity_id", type = "u32" },
  { name = "target_entity_id",   type = "u32" },
  { name = "attack_sequence",    type = "u32" },
  { name = "hit",                type = "u8"  },
  { name = "pad_a",              type = "u8"  },
  { name = "pad_b",              type = "u8"  },
  { name = "pad_c",              type = "u8"  },
  { name = "damage_dealt",       type = "u32" },
  { name = "target_hp",          type = "u32" },
]

# Combat FSM state change broadcast for ghost
[[message]]
id = 0x0332
name = "IntershardCombatState"
channel = "unreliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",    type = "u32" },
  { name = "combat_state", type = "u8"  },
  { name = "pad_a",        type = "u8"  },
  { name = "state_param",  type = "u16" },
  { name = "server_tick",  type = "u32" },
]

# Forward a PLAYER_ACTION from origin shard to learner during handoff.
# Body: entity_id (u32 LE) + raw PlayerAction bytes.
# Codegen emits only the msg_type constant; the payload is hand-assembled.
[[message]]
id = 0x0340
name = "IntershardForwardAction"
channel = "reliable"
direction = "bidirectional"
raw = true

# ─────────────────────────────────────────────
# OVERLAP-HANDOFF MESSAGES (0x0350 - 0x035F)
# ─────────────────────────────────────────────
# Soft-handoff with continuous authority. See entanglement-server's
# DESIGN-PLAN-A.md for the protocol design. Both peers must advertise
# capability "overlap-v1" in their PeerHandshake (see mmo-proto's
# intershard.proto) before they may exchange any 0x035X message.
# Otherwise both fall back to the atomic-handoff path (0x0320..0x0322).

# Sent from the shard a player is leaving toward the peer across a shared
# edge, the moment the player crosses into the overlap band. Carries the
# full entity state and the last-applied client input sequences so the
# peer can begin a parallel non-authoritative physics simulation aligned
# with the source's authoritative state.
#
# Field set mirrors IntershardEntityState (0x0313) with two additions:
#   - source_tick:    the source's server_tick at the instant of capture,
#                     so the peer can stamp its enrolment to a deterministic
#                     starting point for sample reconciliation.
#   - overlap_token:  unique-per-entity-per-overlap nonce. Lets the peer
#                     reject duplicate enrols on the same edge during
#                     resends and pair every subsequent SAMPLE / TRANSFER /
#                     LEAVE to the right enrolment cycle.
[[message]]
id = 0x0350
name = "IntershardOverlapEnrol"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",            type = "u32" },
  { name = "source_tick",          type = "u32" },
  { name = "x",                    type = "f64" },
  { name = "y",                    type = "f64" },
  { name = "z",                    type = "f64" },
  { name = "vx",                   type = "f64" },
  { name = "vy",                   type = "f64" },
  { name = "vz",                   type = "f64" },
  { name = "orientation",          type = "f64" },
  { name = "hp",                   type = "u32" },
  { name = "stamina_x100",         type = "u32" },
  { name = "combat_state",         type = "u8"  },
  { name = "pvp_flag",             type = "u8"  },
  { name = "pad_a",                type = "u8"  },
  { name = "pad_b",                type = "u8"  },
  { name = "combat_state_param",   type = "u32" },
  { name = "group_id",             type = "u32" },
  { name = "last_sequence",        type = "u32" },
  { name = "last_action_sequence", type = "u32" },
  { name = "overlap_token",        type = "u64" },
]

# Sent every OVERLAP_SAMPLE_INTERVAL_TICKS from the current broadcast_owner
# to the peer that's running a parallel non-authoritative sim, carrying the
# authoritative position/velocity at `source_tick` plus the last-applied
# input/action sequences. The peer's local sim re-anchors to this sample
# (snap if divergence exceeds OVERLAP_DIVERGENCE_SNAP_M, soft-correct if
# above OVERLAP_DIVERGENCE_SOFT_M).
#
# Unreliable channel: a dropped sample is recovered by the next one ~3
# ticks later. The mechanism is self-healing.
[[message]]
id = 0x0351
name = "IntershardOverlapSample"
channel = "unreliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",            type = "u32" },
  { name = "source_tick",          type = "u32" },
  { name = "x",                    type = "f64" },
  { name = "y",                    type = "f64" },
  { name = "z",                    type = "f64" },
  { name = "vx",                   type = "f64" },
  { name = "vy",                   type = "f64" },
  { name = "vz",                   type = "f64" },
  { name = "last_sequence",        type = "u32" },
  { name = "last_action_sequence", type = "u32" },
  { name = "overlap_token",        type = "u64" },
]

# Sent from the current broadcast_owner to the peer at the moment the
# authoritative position crosses the cut plane (after HANDOVER_HOLD_TICKS
# of histeresis). Specifies the target tick at which the peer becomes the
# new owner; the previous owner stops broadcasting EntityMove for this
# entity from that tick (but continues simulating until ACK + STAGGER, so
# a lost transfer doesn't strand the entity).
#
# Carries one final authoritative state snapshot to seed the new owner's
# broadcast — that prevents the new owner from broadcasting a sub-frame-
# stale position on its very first tick after handover.
[[message]]
id = 0x0352
name = "IntershardAuthorityTransfer"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",          type = "u32" },
  { name = "target_tick",        type = "u32" },
  { name = "x",                  type = "f64" },
  { name = "y",                  type = "f64" },
  { name = "z",                  type = "f64" },
  { name = "vx",                 type = "f64" },
  { name = "vy",                 type = "f64" },
  { name = "vz",                 type = "f64" },
  { name = "orientation",        type = "f64" },
  { name = "hp",                 type = "u32" },
  { name = "stamina_x100",       type = "u32" },
  { name = "combat_state",       type = "u8"  },
  { name = "pad_a",              type = "u8"  },
  { name = "pad_b",              type = "u8"  },
  { name = "pad_c",              type = "u8"  },
  { name = "combat_state_param", type = "u32" },
  { name = "overlap_token",      type = "u64" },
]

# Confirms the new owner observed AuthorityTransfer at the agreed target
# tick (or at applied_tick if it had to defer one tick due to local
# scheduling). Until the previous owner sees this ACK it keeps its
# parallel sim running so a lost transfer doesn't strand the entity.
[[message]]
id = 0x0353
name = "IntershardAuthorityAck"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",     type = "u32" },
  { name = "applied_tick",  type = "u32" },
  { name = "ok",            type = "u8"  },
  { name = "pad_a",         type = "u8"  },
  { name = "pad_b",         type = "u8"  },
  { name = "pad_c",         type = "u8"  },
  { name = "overlap_token", type = "u64" },
]

# Sent from the current broadcast_owner to the peer when the entity exits
# the overlap band on the owner's side (i.e., moved deep enough into the
# owner's region that the peer's parallel sim is no longer needed). The
# peer drops its parallel sim slot for this entity, freeing CPU / memory.
[[message]]
id = 0x0354
name = "IntershardOverlapLeave"
channel = "reliable"
direction = "bidirectional"
fields = [
  { name = "entity_id",     type = "u32" },
  { name = "overlap_token", type = "u64" },
]
